name: CI

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: "ci-placeholder"
          VITE_FIREBASE_AUTH_DOMAIN: "ci-placeholder"
          VITE_FIREBASE_PROJECT_ID: "ci-placeholder"
          VITE_FIREBASE_STORAGE_BUCKET: "ci-placeholder"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "ci-placeholder"
          VITE_FIREBASE_APP_ID: "ci-placeholder"
      - run: npm run size

  unit-and-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Run unit & integration tests
        id: vitest
        run: |
          mkdir -p test-results
          npx vitest run \
            --reporter=default --reporter=junit --reporter=github-actions \
            --outputFile.junit=test-results/vitest-report.xml \
            --coverage --coverage.reporter=text --coverage.reporter=json-summary \
            --pool=forks 2>&1 | tee test-results/vitest-output.txt
      - name: Generate test summary
        if: always()
        run: |
          echo "## Unit & Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse JUnit XML for test counts
          if [ -f test-results/vitest-report.xml ]; then
            TESTS=$(sed -n 's/.*tests="\([0-9]*\)".*/\1/p' test-results/vitest-report.xml | head -1)
            FAILURES=$(sed -n 's/.*failures="\([0-9]*\)".*/\1/p' test-results/vitest-report.xml | head -1)
            ERRORS=$(sed -n 's/.*errors="\([0-9]*\)".*/\1/p' test-results/vitest-report.xml | head -1)
            TIME=$(sed -n 's/.*<testsuites.*time="\([0-9.]*\)".*/\1/p' test-results/vitest-report.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))

            if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
              echo "✅ **All ${TESTS} tests passed** in ${TIME}s" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **${FAILURES} failed**, ${PASSED} passed out of ${TESTS} tests (${TIME}s)" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | ${PASSED} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | ${FAILURES} |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | ${ERRORS} |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${TIME}s |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No JUnit report found" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Extract coverage summary from vitest output
          if [ -f test-results/vitest-output.txt ]; then
            echo "### Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "^(File |All files|-.*\|.*-)" test-results/vitest-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: test-results/
          retention-days: 14

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        id: playwright
        run: npx playwright test --project=chromium --reporter=list --reporter=junit --reporter=github 2>&1 | tee e2e-results.txt
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: test-results/e2e-report.xml
      - name: Generate E2E test summary
        if: always()
        run: |
          echo "## E2E Tests (Chromium)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f test-results/e2e-report.xml ]; then
            TESTS=$(sed -n 's/.*tests="\([0-9]*\)".*/\1/p' test-results/e2e-report.xml | head -1)
            FAILURES=$(sed -n 's/.*failures="\([0-9]*\)".*/\1/p' test-results/e2e-report.xml | head -1)
            ERRORS=$(sed -n 's/.*errors="\([0-9]*\)".*/\1/p' test-results/e2e-report.xml | head -1)
            TIME=$(sed -n 's/.*<testsuites.*time="\([0-9.]*\)".*/\1/p' test-results/e2e-report.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))

            if [ "$FAILURES" = "0" ] && [ "$ERRORS" = "0" ]; then
              echo "✅ **All ${TESTS} E2E tests passed** in ${TIME}s" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **${FAILURES} failed**, ${PASSED} passed out of ${TESTS} E2E tests (${TIME}s)" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | ${PASSED} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | ${FAILURES} |" >> $GITHUB_STEP_SUMMARY
            echo "| Duration | ${TIME}s |" >> $GITHUB_STEP_SUMMARY

            # List failed tests if any
            if [ "$FAILURES" != "0" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Failed Tests" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              sed -n 's/.*<testcase.*name="\([^"]*\)".*>\s*<failure.*/- `\1`/p' test-results/e2e-report.xml | sort -u >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ No JUnit report found" >> $GITHUB_STEP_SUMMARY
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

