name: Deploy to Production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Configure Stripe extension
        run: |
          mkdir -p extensions
          cat > extensions/firestore-stripe-payments.env << 'PARAMS'
          LOCATION=europe-west2
          STRIPE_API_KEY=${{ secrets.PROD_STRIPE_API_KEY }}
          CUSTOMERS_COLLECTION=customers
          PRODUCTS_COLLECTION=products
          SYNC_USERS_ON_CREATE=Disabled
          PARAMS
      - name: Deploy Firestore rules and extensions
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_THEATRELOG_84575 }}' > /tmp/sa.json
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json npx firebase-tools deploy --only firestore:rules --project theatrelog-84575 --non-interactive
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json npx firebase-tools deploy --only extensions --project theatrelog-84575 --non-interactive
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.PROD_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.PROD_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.PROD_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PROD_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.PROD_FIREBASE_APP_ID }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_THEATRELOG_84575 }}
          projectId: theatrelog-84575
          target: production
          channelId: live
